name: Run Daily News Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 8:00 AM WAT (UTC+1)
    - cron: '0 18 * * *'  # 7:00 PM WAT (UTC+1)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Digest slot (morning or evening)'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set digest slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "DIGEST_SLOT=${{ github.event.inputs.slot }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "07" ]; then
              echo "DIGEST_SLOT=morning" >> $GITHUB_ENV
            else
              echo "DIGEST_SLOT=evening" >> $GITHUB_ENV
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute digest engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          DIGEST_SLOT: ${{ env.DIGEST_SLOT }}
        run: python -m src.main

      - name: Upload raw headlines artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raw-headlines-${{ env.DIGEST_SLOT }}
          path: artifacts/
          if-no-files-found: ignore

      - name: Commit state and archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_articles.json docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update digest archive and state [${{ env.DIGEST_SLOT }}]"
            git push
          fi
